name: LogiPulse Daily Briefing

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 生成日报
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Commit and push reports
        run: |
          git config user.name "LogiPulse Bot"
          git config user.email "logipulse@jones.dev"
          git add reports/
          git diff --staged --quiet || git commit -m "📦 Daily briefing: $(date +%Y-%m-%d)"
          git push
